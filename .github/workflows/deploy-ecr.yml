# Build and push web image to ECR when changes land on main (e.g. merge PR dev → main).
# Does not run on pushes to dev or other branches.
name: Build and push web to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: commit SHA on main)'
        required: false
        type: string

concurrency:
  group: ecr-web-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_WEB_REPO: newspulse-web

jobs:
  build-web:
    # Native arm64 on production EC2 — Next.js/Tailwind native binaries SIGILL under QEMU.
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_WEB_REPO }}" --region "${{ env.AWS_REGION }}" 2>/dev/null; then
            aws ecr create-repository \
              --repository-name "${{ env.ECR_WEB_REPO }}" \
              --region "${{ env.AWS_REGION }}" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag and API URL
        id: meta
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [[ -z "$NEXT_PUBLIC_API_URL" ]]; then
            echo "Set repository variable NEXT_PUBLIC_API_URL (e.g. https://api.yourdomain.com/api)" >&2
            exit 1
          fi
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then TAG="${{ github.sha }}"; fi
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_url=${NEXT_PUBLIC_API_URL}" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${{ env.ECR_WEB_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "web_latest=${REGISTRY}/${{ env.ECR_WEB_REPO }}:latest" >> "$GITHUB_OUTPUT"

      # t4g.small (2 GiB) + running Compose stack: npm ci needs extra headroom.
      - name: Ensure swap for Docker build
        run: |
          if ! sudo swapon --show | grep -q '/swapfile'; then
            sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi
          free -h

      - name: Build and push frontend image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_NEWSMINE_ENV=prod
            NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.api_url }}
          tags: |
            ${{ steps.meta.outputs.web_image }}
            ${{ steps.meta.outputs.web_latest }}
          platforms: linux/arm64
          provenance: false
          cache-from: type=local,src=/home/ssm-user/.buildx-cache-web
          cache-to: type=local,dest=/home/ssm-user/.buildx-cache-web,mode=max

      - name: Summary
        run: |
          echo "### Web image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.web_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.web_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
