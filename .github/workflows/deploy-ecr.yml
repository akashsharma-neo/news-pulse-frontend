name: Build and push web to ECR

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/deploy-ecr.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: git sha)'
        required: false
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_WEB_REPO: newspulse-web

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag and API URL
        id: meta
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [[ -z "$NEXT_PUBLIC_API_URL" ]]; then
            echo "Set repository variable NEXT_PUBLIC_API_URL (e.g. https://api.yourdomain.com/api)" >&2
            exit 1
          fi
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then TAG="${{ github.sha }}"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_url=${NEXT_PUBLIC_API_URL}" >> "$GITHUB_OUTPUT"
          ACCOUNT="${{ steps.ecr.outputs.registry }}"
          echo "web_image=${ACCOUNT}/${{ env.ECR_WEB_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_NEWSMINE_ENV=prod
            NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.api_url }}
          tags: |
            ${{ steps.meta.outputs.web_image }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_WEB_REPO }}:latest
          platforms: linux/arm64

      - name: Image summary
        run: echo "Pushed ${{ steps.meta.outputs.web_image }}"
