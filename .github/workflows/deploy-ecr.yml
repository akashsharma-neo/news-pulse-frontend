# Build and push web image to ECR when changes land on main.
# Private repos: Next.js native binaries SIGILL under QEMU, so we upload source to S3
# and docker build runs natively on the ARM EC2 instance via SSM.
name: Build and push web to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: commit SHA on main)'
        required: false
        type: string

concurrency:
  group: ecr-web-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  build-web:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate deploy variables
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          WEB_BUILD_S3_URI: ${{ vars.WEB_BUILD_S3_URI }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [[ -z "$EC2_INSTANCE_ID" ]]; then
            echo "Set repository variable EC2_INSTANCE_ID (e.g. i-0a11e539620eeefac)." >&2
            exit 1
          fi
          if [[ -z "$WEB_BUILD_S3_URI" ]]; then
            echo "Set repository variable WEB_BUILD_S3_URI (e.g. s3://your-backup-bucket/web-builds)." >&2
            exit 1
          fi
          if [[ -z "$NEXT_PUBLIC_API_URL" ]]; then
            echo "Set repository variable NEXT_PUBLIC_API_URL (e.g. https://api.yourdomain.com/api)." >&2
            exit 1
          fi

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then TAG="${{ github.sha }}"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload source tarball to S3
        env:
          WEB_BUILD_S3_URI: ${{ vars.WEB_BUILD_S3_URI }}
        run: |
          TARBALL="/tmp/nexprep-web-${{ steps.meta.outputs.tag }}.tar.gz"
          tar czf "$TARBALL" --exclude=node_modules --exclude=.next .
          aws s3 cp "$TARBALL" "${WEB_BUILD_S3_URI%/}/${{ steps.meta.outputs.tag }}.tar.gz" --region "${{ env.AWS_REGION }}"

      - name: Build on ARM EC2 via SSM
        id: ssm
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --region "${{ env.AWS_REGION }}" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "NexPrep web ECR build ${{ steps.meta.outputs.tag }}" \
            --parameters "commands=[\"/opt/newspulse/deploy/build-web-ecr.sh ${{ steps.meta.outputs.tag }}\"]" \
            --output text \
            --query 'Command.CommandId')
          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM command: ${CMD_ID}"

      - name: Wait for EC2 build
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          aws ssm wait command-executed \
            --region "${{ env.AWS_REGION }}" \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID"
          STATUS=$(aws ssm get-command-invocation \
            --region "${{ env.AWS_REGION }}" \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM status: ${STATUS}"
          aws ssm get-command-invocation \
            --region "${{ env.AWS_REGION }}" \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '[StandardOutputContent, StandardErrorContent]' --output text
          if [[ "$STATUS" != "Success" ]]; then
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Web image built on EC2 and pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Instance: \`${{ vars.EC2_INSTANCE_ID }}\`" >> "$GITHUB_STEP_SUMMARY"
